<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a5f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <polygon points="0,250 200,120 400,280 600,100 800,250 800,450 0,450" fill="url(#forest)"/>
  <circle cx="150" cy="100" r="40" fill="#ffd700" opacity="0.8"/>
  <text x="400" y="225" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold" opacity="0.7">Benefits</text>
